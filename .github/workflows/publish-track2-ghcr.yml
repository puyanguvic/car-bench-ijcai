name: Publish Track 2 Release Candidate to GHCR

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Track 2 agent to publish"
        required: true
        type: choice
        options:
          - direct
          - planner_executor
      image_tag:
        description: "Immutable human-readable release tag (for example, track2-rc1)"
        required: true
        default: "track2-rc1"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Fetch pinned CAR-bench dependency
        run: ./scripts/setup_car_bench.sh

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify release candidate
        run: |
          uv sync --frozen --extra track-2-agent --extra car-bench-evaluator
          uv run ruff check src tests scripts generate_compose.py
          uv run pytest -q

      - name: Select release variant
        id: config
        shell: bash
        run: |
          case "${{ inputs.variant }}" in
            direct)
              echo "dockerfile=src/track_2_agent_under_test_cerebras/Dockerfile.track-2-agent-under-test-cerebras" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${{ github.repository_owner }}/car-bench-track-2-direct" >> "$GITHUB_OUTPUT"
              ;;
            planner_executor)
              echo "dockerfile=src/track_2_agent_under_test_cerebras_planner/Dockerfile.track-2-agent-under-test-cerebras-planner" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${{ github.repository_owner }}/car-bench-track-2-planner-executor" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported variant: ${{ inputs.variant }}" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.config.outputs.image }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,format=long

      - name: Build and push linux/amd64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record immutable submission reference
        shell: bash
        run: |
          {
            echo "## Track 2 image published"
            echo
            echo "- Variant: \`${{ inputs.variant }}\`"
            echo "- Image: \`${{ steps.config.outputs.image }}@${{ steps.build.outputs.digest }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "Set the GHCR package visibility to **Public**, then use this exact digest with \`scripts/prepare_track2_submission.py\`."
          } >> "$GITHUB_STEP_SUMMARY"
