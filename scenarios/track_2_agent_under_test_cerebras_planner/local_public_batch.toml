# Local public batch scenario for the Track 2 Cerebras planner/executor agent.
# Runs a medium-sized public test subset for failure analysis.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_2_agent_under_test_cerebras_planner/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 10
tasks_hallucination_num_tasks = 10
tasks_disambiguation_num_tasks = 10
max_steps = 50
