# Local Docker full test-set scenario for the PACT Track 2 agent under test.
# Generate with:
#   uv run python generate_compose.py --scenario scenarios/track_2_agent_under_test_cerebras/local_docker_test_set.toml

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
build = { context = ".", dockerfile = "src/track_2_agent_under_test_cerebras/Dockerfile.track-2-agent-under-test-cerebras" }

[agent_under_test.env]
CEREBRAS_API_KEY = "${CEREBRAS_API_KEY:?Set CEREBRAS_API_KEY in .env}"
PACT_COMPILER_MODEL = "${PACT_COMPILER_MODEL:-gpt-oss-120b}"
PACT_COMPILER_CEREBRAS_API_BASE = "${PACT_COMPILER_CEREBRAS_API_BASE:-https://api.cerebras.ai}"
PACT_COMPILER_SERVICE_TIER = "${PACT_COMPILER_SERVICE_TIER:-}"
PACT_COMPILER_REASONING_EFFORT = "${PACT_COMPILER_REASONING_EFFORT:-low}"
PACT_COMPILER_MAX_COMPLETION_TOKENS = "${PACT_COMPILER_MAX_COMPLETION_TOKENS:-4096}"
PACT_COMPILER_TEMPERATURE = "${PACT_COMPILER_TEMPERATURE:-}"
PACT_COMPILER_MAX_REPAIR_ATTEMPTS = "${PACT_COMPILER_MAX_REPAIR_ATTEMPTS:-1}"
PACT_CEREBRAS_MAX_RATE_LIMIT_RETRIES = "${PACT_CEREBRAS_MAX_RATE_LIMIT_RETRIES:-3}"
PACT_CEREBRAS_MAX_RATE_LIMIT_WAIT_SECONDS = "${PACT_CEREBRAS_MAX_RATE_LIMIT_WAIT_SECONDS:-600}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
