# Local Docker full test-set scenario for the Track 2 Cerebras agent under test.
# Generate with:
#   uv run python generate_compose.py --scenario scenarios/track_2_agent_under_test_cerebras/local_docker_test_set.toml

[evaluator]
build = { context = ".", dockerfile = "src/evaluator/Dockerfile.evaluator" }
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}", CAR_BENCH_DATA_DIR = "/workspace/third_party/car-bench/car_bench/envs/car_voice_assistant/mock_data" }
volumes = ["./third_party/car-bench:/workspace/third_party/car-bench:ro"]

[agent_under_test]
build = { context = ".", dockerfile = "src/track_2_agent_under_test_cerebras/Dockerfile.track-2-agent-under-test-cerebras" }
env = { CEREBRAS_API_KEY = "${CEREBRAS_API_KEY:?Set CEREBRAS_API_KEY in .env}", TRACK2_EXECUTOR_MODEL = "${TRACK2_EXECUTOR_MODEL:-cerebras/gpt-oss-120b}", TRACK2_CEREBRAS_API_BASE = "${TRACK2_CEREBRAS_API_BASE:-https://api.cerebras.ai/v1}", TRACK2_CEREBRAS_SERVICE_TIER = "${TRACK2_CEREBRAS_SERVICE_TIER:-}", TRACK2_MAX_COMPLETION_TOKENS = "${TRACK2_MAX_COMPLETION_TOKENS:-1024}", TRACK2_TEMPERATURE = "${TRACK2_TEMPERATURE:-0}", TRACK2_LLM_MIN_INTERVAL_SECONDS = "${TRACK2_LLM_MIN_INTERVAL_SECONDS:-0}", TRACK2_LLM_REQUESTS_PER_MINUTE = "${TRACK2_LLM_REQUESTS_PER_MINUTE:-}", TRACK2_LLM_REQUESTS_PER_HOUR = "${TRACK2_LLM_REQUESTS_PER_HOUR:-}", TRACK2_LLM_REQUESTS_PER_DAY = "${TRACK2_LLM_REQUESTS_PER_DAY:-}", TRACK2_LLM_TOKENS_PER_MINUTE = "${TRACK2_LLM_TOKENS_PER_MINUTE:-}", TRACK2_LLM_TOKENS_PER_HOUR = "${TRACK2_LLM_TOKENS_PER_HOUR:-}", TRACK2_LLM_TOKENS_PER_DAY = "${TRACK2_LLM_TOKENS_PER_DAY:-}", TRACK2_LLM_TOKEN_ESTIMATE_CHARS_PER_TOKEN = "${TRACK2_LLM_TOKEN_ESTIMATE_CHARS_PER_TOKEN:-4}", TRACK2_LLM_TOKEN_SAFETY_FACTOR = "${TRACK2_LLM_TOKEN_SAFETY_FACTOR:-1.1}", TRACK2_LLM_MAX_SCHEDULE_WAIT_SECONDS = "${TRACK2_LLM_MAX_SCHEDULE_WAIT_SECONDS:-}", TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS:-60}", TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS = "${TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS:-1}", CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR = "${CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR:-/tmp/car-bench-rate-limit-reports}", TRACK2_CEREBRAS_RAW_ERROR_PROBE = "${TRACK2_CEREBRAS_RAW_ERROR_PROBE:-0}", TRACK2_CEREBRAS_RAW_ERROR_PROBE_TIMEOUT_SECONDS = "${TRACK2_CEREBRAS_RAW_ERROR_PROBE_TIMEOUT_SECONDS:-30}", TRACK2_LLM_MALFORMED_RETRIES = "${TRACK2_LLM_MALFORMED_RETRIES:-1}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
